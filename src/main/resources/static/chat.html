<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💬 Live Chat with WebSocket</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #0078D7;
      color: white;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 15px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .message.sent {
      background: #DCF8C6;
      align-self: flex-end;
    }

    .message.received {
      background: #E8E8E8;
      align-self: flex-start;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .chat-input input {
      flex: 1;
      border: none;
      padding: 10px;
      font-size: 14px;
    }

    .chat-input button {
      background: #0078D7;
      border: none;
      color: white;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .chat-input button:hover {
      background: #005fa3;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">💬 WebSocket Live Chat</div>
    <div id="chat-box" class="chat-box"></div>

    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // Create WebSocket connection to your backend
    const socket = new WebSocket("ws://localhost:8080/chat");
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("messageInput");

    socket.onopen = () => {
      addMessage("Connected to chat ✅", "received");
    };

    socket.onmessage = (event) => {
      addMessage(event.data, "received");
    };

    socket.onclose = () => {
      addMessage("Disconnected ❌", "received");
    };

    function sendMessage() {
      const msg = input.value.trim();
      if (msg === "") return;

      // Display message on screen immediately
      addMessage(msg, "sent");

      // Send to WebSocket server
      socket.send(msg);

      input.value = "";
    }

    // Utility function to show messages
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.classList.add("message", type);
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
